name: Sync to freemcp.space

on:
  push:
    branches: [main]
    paths:
      - "servers/**/*.json"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to freemcp.space
        env:
          FREEMCP_SYNC_URL: ${{ secrets.FREEMCP_SYNC_URL }}
          FREEMCP_SYNC_SECRET: ${{ secrets.FREEMCP_SYNC_SECRET }}
        run: |
          if [ -z "$FREEMCP_SYNC_URL" ] || [ -z "$FREEMCP_SYNC_SECRET" ]; then
            echo "❌ FREEMCP_SYNC_URL or FREEMCP_SYNC_SECRET not set"
            exit 1
          fi

          # Build JSON payload safely via jq — avoids shell injection from manifest content
          payload=$(find servers -name '*.json' | sort | xargs jq -s '{"servers": .}')
          count=$(echo "$payload" | jq '.servers | length')

          signature=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$FREEMCP_SYNC_SECRET" | sed 's/^.* //')

          echo "Sending sync payload ($count manifests) ..."
          http_code=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
            -X POST "$FREEMCP_SYNC_URL" \
            -H "Content-Type: application/json" \
            -H "x-registry-signature: sha256=$signature" \
            -d "$payload" \
            --max-time 60)

          cat /tmp/sync_response.json

          if [ "$http_code" != "200" ]; then
            echo "❌ Sync failed with HTTP $http_code"
            exit 1
          fi
          echo "✅ Sync completed successfully"
